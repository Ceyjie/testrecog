<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPal Robot Control</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .target-btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            background-color: #ddd;
            color: #333;
        }
        .target-btn.active {
            background-color: #4CAF50; /* Green */
            color: white;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            vertical-align: middle;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #2196F3;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>

<div class="main-container">

    <header>
        <h1>🤖 MedPal Robot</h1>
        <div class="status-row">
            <label class="switch">
                <input type="checkbox" id="followToggle" onchange="toggleFollow(this.checked)">
                <span class="slider"></span>
            </label>
            <span id="followLabel" style="margin-left: 10px; font-weight: bold;">Follow Mode: OFF</span>
        </div>
    </header>

    <section class="status-section">
        <div class="status-box">
            <div class="status-label">Current Action</div>
            <div id="statusText" class="status-value">READY</div>
        </div>
        <div id="directionIcon" class="direction-icon">⏹</div>
    </section>

    <section class="control-section">
        <div style="margin-top:10px; text-align: center;">
            <p>Select Target to Follow:</p>
            <div id="targetList">
                <!-- Buttons generated by JS -->
                <button class="target-btn" onclick="setTarget('NONE')">Stop Following</button>
            </div>
        </div>

        <div style="margin-top:20px;">
            <label>Speed:</label>
            <input type="range" min="0" max="100" value="60" id="speedSlider">
            <span id="speedValue">60%</span>
        </div>
        <div class="control-pad">
            <button id="btn-forward" onclick="sendCommand('forward')">▲</button>
            <button id="btn-left" onclick="sendCommand('left')">◀</button>
            <button id="btn-stop" class="stop-btn" onclick="sendCommand('stop')">STOP</button>
            <button id="btn-right" onclick="sendCommand('right')">▶</button>
            <button id="btn-backward" onclick="sendCommand('backward')">▼</button>
        </div>
    </section>

</div>

<script>
const slider = document.getElementById("speedSlider");
const speedValue = document.getElementById("speedValue");
let debounceTimer = null;
let currentTarget = "Carl";
let isFollowMode = false;

// Load persons on startup
window.addEventListener("DOMContentLoaded", () => {
    // Load Speed
    fetch("/get_speed")
        .then(res => res.json())
        .then(data => {
            let percent = Math.round(data.speed * 100);
            slider.value = percent;
            speedValue.innerHTML = percent + "%";
        });

    // Load Target and Follow Mode
    fetch("/get_status")
        .then(res => res.json())
        .then(data => {
            currentTarget = data.target;
            isFollowMode = data.follow_mode;
            updateUI();
        });
        
    // Load Person List
    fetch("/get_persons")
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('targetList');
            list.innerHTML = '';
            data.persons.forEach(name => {
                let btn = document.createElement('button');
                btn.className = 'target-btn';
                btn.innerText = name;
                btn.onclick = () => setTarget(name);
                if (name === currentTarget) btn.classList.add('active');
                list.appendChild(btn);
            });
            // Add "Stop" button
            let stopBtn = document.createElement('button');
            stopBtn.className = 'target-btn';
            stopBtn.innerText = 'STOP';
            stopBtn.onclick = () => setTarget('NONE');
            list.appendChild(stopBtn);
        });
        
    // Update status loop
    setInterval(() => {
        fetch("/get_status")
            .then(res => res.json())
            .then(data => {
                document.getElementById("statusText").innerText = data.action;
                if (data.follow_mode !== isFollowMode) {
                    isFollowMode = data.follow_mode;
                    document.getElementById("followToggle").checked = isFollowMode;
                    document.getElementById("followLabel").innerText = "Follow Mode: " + (isFollowMode ? "ON" : "OFF");
                }
            });
    }, 500);
});

function updateUI() {
    document.getElementById("followToggle").checked = isFollowMode;
    document.getElementById("followLabel").innerText = "Follow Mode: " + (isFollowMode ? "ON" : "OFF");
}

function setTarget(name) {
    fetch("/set_target/" + name).then(() => {
        currentTarget = name;
        // Update buttons
        let btns = document.getElementsByClassName('target-btn');
        for (let btn of btns) {
            if (btn.innerText === name) btn.classList.add('active');
            else btn.classList.remove('active');
        }
    });
}

function toggleFollow(val) {
    fetch("/set_follow_mode/" + val).then(() => {
        isFollowMode = val;
        document.getElementById("followLabel").innerText = "Follow Mode: " + (val ? "ON" : "OFF");
    });
}

// Debounced update
slider.addEventListener("input", function() {
    let percent = this.value;
    speedValue.innerHTML = percent + "%";
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        let speed = percent / 100;
        fetch("/set_speed/" + speed);
    }, 100);
});
</script>

<script src="{{ url_for('static', filename='scripts.js') }}"></script>

</body>
</html>
